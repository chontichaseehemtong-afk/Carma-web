<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARMA - เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Promt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg" data-page="login">

    <div class="login-card p-4 p-md-5 shadow-lg bg-white">
        <div class="text-center mb-4">
            <h1 class="text-primary fw-bold"><i class="fas fa-car-crash"></i> CARMA</h1>
            <p class="text-muted">ระบบบริหารจัดการรถยนต์และซ่อมบำรุง</p>
        </div>
        <div class="alert alert-light border border-secondary border-dashed p-3 mb-4 rounded-3" style="font-size: 14px;">
            <strong class="text-primary"><i class="fas fa-info-circle"></i> บัญชีสำหรับทดสอบ:</strong><br>
            <div class="mt-2"><i class="fas fa-crown text-warning"></i> <b>แอดมิน:</b> <code>admin</code> / <code>admin123</code></div>
            <div class="mt-1"><i class="fas fa-user text-primary"></i> <b>พนักงาน:</b> <code>user</code> / <code>user123</code></div>
        </div>
        <form id="login-form">
            <div class="mb-3"><input type="text" id="username" class="form-control form-control-lg bg-light" placeholder="ชื่อผู้ใช้ (Username)" autocomplete="off" required></div>
            <div class="mb-4"><input type="password" id="password" class="form-control form-control-lg bg-light" placeholder="รหัสผ่าน (Password)" required></div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">เข้าสู่ระบบ <i class="fas fa-sign-in-alt ms-2"></i></button>
            <div id="login-error" class="alert alert-danger mt-3 py-2 text-center" style="display: none; font-size: 14px;"></div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
